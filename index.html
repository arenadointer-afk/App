<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="app-version" content="2.0.0">
  <title>Meu Financeiro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="/App/manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="lock" class="lock" style="background: #0f0f14;">
  <div style="text-align:center; padding: 20px; max-width: 300px;">
    <div style="font-size: 60px; margin-bottom: 20px;">🛡️</div>
    <h2 style="color:white; margin-bottom: 10px;">Acesso Restrito</h2>
    <p style="color: #888; margin-bottom: 20px; font-size: 14px;">Identifique-se para continuar</p>
    
    <input type="email" id="loginEmail" placeholder="E-mail" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #222; color: white; margin-bottom: 10px;">
    <input type="password" id="loginSenha" placeholder="Senha" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #222; color: white; margin-bottom: 20px;">
    
    <button onclick="fazerLoginFirebase()" style="width: 100%; background:#000000; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; cursor: pointer;">ENTRAR</button>
    <button onclick="acaoBotaoBiometria()" style="width: 100%; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer;">USAR BIOMETRIA</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topo">
    <div class="perfil">
      <img id="fotoPerfil" src="https://via.placeholder.com/50" alt="Foto">
      <input type="file" id="uploadFoto" hidden accept="image/*">
      <h2 id="nomePerfil" style="margin:0; font-size:18px;">Bem-vindo, Sutello.</h2>
    </div>
  </div>

  <div class="filtros">
    <button class="ativo" onclick="setFiltro('todas', this)">Todas</button>
    <button onclick="setFiltro('pagas', this)">Pagas</button>
  </div>

  <div id="lista" class="lista"></div>

  <div id="historicoLogs" style="display:none; padding: 15px; padding-bottom: 80px;">
      <h2 style="text-align:center;">📜 Registro de Atividades</h2>
      <div style="text-align:center; margin-bottom:15px;">
        <button onclick="limparLogs('dia')" style="background:#555; border:none; padding:5px 10px; border-radius:5px; color:white; margin:2px;">Limpar Hoje</button>
        <button onclick="limparLogs('mes')" style="background:#555; border:none; padding:5px 10px; border-radius:5px; color:white; margin:2px;">Limpar Mês</button>
        <button onclick="limparLogs('tudo')" style="background:#c62828; border:none; padding:5px 10px; border-radius:5px; color:white; margin:2px;">Limpar Tudo</button>
      </div>
      <div id="listaLogs"></div>
      <button onclick="fecharHistoricoLogs()" style="width:100%; padding:12px; background:#333; color:white; border:none; border-radius:8px; margin-top:20px;">Voltar</button>
  </div>

  <div class="rodape">
    <button onclick="adicionarConta()">➕ Nova</button>
    <button onclick="abrirHistorico()">📊 Histórico</button>
    <button onclick="abrirCalculadora()">🧮 Calc</button>
    <button onclick="abrirOpcoes()">⚙️ Opções</button>
  </div>
</div>

<div id="modalCalc" class="modal" style="display:none">
  <div class="modal-conteudo">
    <h3>🧮 Calculadora</h3>
    <input type="text" id="calcDisplay" readonly>
    <div class="calc-grid">
      <button onclick="calcAdd('7')">7</button><button onclick="calcAdd('8')">8</button><button onclick="calcAdd('9')">9</button><button onclick="calcAdd('/')">÷</button>
      <button onclick="calcAdd('4')">4</button><button onclick="calcAdd('5')">5</button><button onclick="calcAdd('6')">6</button><button onclick="calcAdd('*')">×</button>
      <button onclick="calcAdd('1')">1</button><button onclick="calcAdd('2')">2</button><button onclick="calcAdd('3')">3</button><button onclick="calcAdd('-')">−</button>
      <button onclick="calcAdd('0')">0</button><button onclick="calcAdd('.')">.</button><button onclick="calcCalcular()">=</button><button onclick="calcAdd('+')">+</button>
    </div>
    <button onclick="calcLimpar()" style="background:#ef5350; color:white;">🧹 Limpar</button>
    <button onclick="fecharCalculadora()" style="background:#9e9e9e; color:white;">❌ Fechar</button>
  </div>
</div>

<div id="modalOpcoes" class="modal" style="display:none">
  <div class="modal-conteudo">
    <h3>⚙️ Opções</h3>
    <button onclick="baixarBackup()" style="background:#2ecc71; color:white; margin-bottom:10px;">💾 Salvar Backup (Baixar)</button>
    <button onclick="document.getElementById('inputRestore').click()" style="background:#333; color:white; margin-bottom:10px;">📂 Restaurar Backup</button>
    <input type="file" id="inputRestore" hidden onchange="lerArquivoBackup(this)" accept=".json">
    
    <button onclick="verificarAtualizacoesManualmente()" style="background:#3498db; color:white; margin-bottom:10px;">🔄 Verificar Atualizações</button>
    
    <button onclick="abrirConfiguracoesDoApp()" style="background:#4a4a5a; color:white; margin-bottom:10px;">⚙️ Configurações do Perfil</button>
    
    <button onclick="fecharOpcoes()" style="background:#9e9e9e; color:white;">❌ Fechar</button>
  </div>
</div>



<div id="modalDecisao" class="modal" style="display:none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center;">
  <div class="modal-conteudo" style="background: #1c1c26; padding: 25px; border-radius: 15px; text-align: center; width: 85%; max-width: 320px; border: 1px solid #333;">
    <h3 id="tituloDecisao" style="color: white; margin-top: 0;">🛡️ Segurança</h3>
    <p id="textoDecisao" style="color: #ccc; margin: 20px 0;"></p>
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <button id="btnOpcao1" style="background: #7b2ff7; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">CONFIRMAR</button>
      <button id="btnOpcao2" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; cursor: pointer;">CANCELAR</button>
    </div>
  </div>
</div>

<div id="secaoConfiguracoes" class="tela-fullscreen" style="display:none;">
    <div class="config-container">
        <button onclick="fecharConfiguracoes()" style="background:none; border:none; color:white; font-size:20px; margin-bottom: 20px;">⬅️ Voltar</button>
        <h2 style="text-align:center;">⚙️ Configurações</h2>

        <div style="text-align:center; margin-bottom: 20px;">
            <img id="confFoto" src="https://via.placeholder.com/100" style="width: 100px; height: 100px; border-radius: 50%; border: 2px solid #7b2ff7; object-fit: cover;">
            <br><button onclick="document.getElementById('uploadFotoConf').click()" style="margin-top:10px; padding: 5px 15px; border-radius: 5px; border: none;">Alterar Foto</button>
            <input type="file" id="uploadFotoConf" style="display:none" onchange="previewFotoConf(event)">
        </div>

        <label style="font-size:14px; color:#aaa;">Nome da Conta</label>
        <input type="text" id="confNome" placeholder="Seu nome" style="width:100%; padding:12px; margin-bottom:15px; background:#222; border:1px solid #444; color:white; border-radius:8px; box-sizing:border-box;">

        <div style="background:#222; padding:15px; border-radius:8px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; border:1px solid #444;">
            <span>Ativar Biometria</span>
            <input type="checkbox" id="confBiometria" style="transform:scale(1.5);">
        </div>

        <label style="font-size:14px; color:#aaa;">E-mail</label>
        <input type="email" id="confEmail" placeholder="Seu E-mail" style="width:100%; padding:12px; margin-bottom:15px; background:#222; border:1px solid #444; color:white; border-radius:8px; box-sizing:border-box;">
        
        <label style="font-size:14px; color:#aaa;">Nova Senha</label>
        <input type="password" id="confSenha" placeholder="Deixe vazio para não alterar" style="width:100%; padding:12px; margin-bottom:20px; background:#222; border:1px solid #444; color:white; border-radius:8px; box-sizing:border-box;">

        <button onclick="salvarTudoConfig()" style="width:100%; padding:15px; background:#7b2ff7; border:none; color:white; border-radius:8px; font-weight:bold; cursor:pointer;">SALVAR ALTERAÇÕES</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script> 
<script src="app.js"></script>
<script>
  // Registro Simples do Service Worker
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/App/service-worker.js");
  }

  // Função que força a checagem no servidor
  async function checarVersaoServidor() {
    try {
      // Busca o index.html do servidor ignorando o cache do navegador
      const response = await fetch(window.location.href + "?t=" + Date.now(), { cache: "no-store" });
      const text = await response.text();
      
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, "text/html");
      const versaoServidor = doc.querySelector('meta[name="app-version"]')?.content;
      const versaoLocal = document.querySelector('meta[name="app-version"]')?.content;

      // Se a versão lá em cima for diferente da daqui, avisa o usuário
      if (versaoServidor && versaoLocal && versaoServidor !== versaoLocal) {
        mostrarConfirmacaoModal(
          "🚀 Atualização Disponível",
          `Nova versão ${versaoServidor} encontrada. Deseja atualizar o design e funções agora?`,
          async () => {
            // Limpa os caches salvos e recarrega a página do zero
            if ('caches' in window) {
              const keys = await caches.keys();
              await Promise.all(keys.map(key => caches.delete(key)));
            }
            window.location.reload(true);
          }
        );
      }
    } catch (e) {
      console.log("Busca de atualização falhou (provavelmente offline)");
    }
  }

  // Verifica se há novidades 2 segundos após abrir
  setTimeout(checarVersaoServidor, 2000);
</script>

</body>
</html>
